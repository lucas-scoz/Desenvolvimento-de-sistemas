<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>MusicHub</title>
<link rel="stylesheet" href="teste1.css">
</head>

<body>

<header>
<h1>MusicHub</h1>
</header>

<main class="container">

<!-- LISTA DE MÚSICAS -->
<section class="musicas">
<h2>Músicas</h2>

<div class="lista">

<div class="info">
<span class="nome-musica">Blinding Lights</span>
<span class="nome-artista">The Weeknd</span>
</div>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/en/2/2f/Bohemian_Rhapsody.png" alt="Bohemian Rhapsody">
<div class="info">
<span class="nome-musica">Bohemian Rhapsody</span>
<span class="nome-artista">Queen</span>
</div>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/en/e/e6/Beatles_-_Abbey_Road.jpg" alt="Come Together">
<div class="info">
<span class="nome-musica">Come Together</span>
<span class="nome-artista">The Beatles</span>
</div>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/en/1/1b/Linkin_Park_-_Numb_CD_cover.jpg" alt="Numb">
<div class="info">
<span class="nome-musica">Numb</span>
<span class="nome-artista">Linkin Park</span>
</div>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/en/c/c4/Lana_Del_Rey_-_Summertime_Sadness.png" alt="Summertime Sadness">
<div class="info">
<span class="nome-musica">Summertime Sadness</span>
<span class="nome-artista">Lana Del Rey</span>
</div>
</div>
</div>
</section>

<!-- PONTE CENTRAL -->
<section class="ponte">
<p>🎵 Sua playlist personalizada 🎵</p>
</section>

<!-- LISTA DE ARTISTAS -->
<section class="artistas">
<h2>Artistas</h2>

<div class="lista">
<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/The_Weeknd_2018.jpg" alt="The Weeknd">
<span class="nome-artista">The Weeknd</span>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/1f/Freddie_Mercury_1984.jpg" alt="Freddie Mercury">
<span class="nome-artista">Freddie Mercury</span>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/df/The_Fabs.JPG" alt="The Beatles">
<span class="nome-artista">The Beatles</span>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Linkin_Park_2014.jpg" alt="Linkin Park">
<span class="nome-artista">Linkin Park</span>
</div>

<div class="item">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/76/Lana_Del_Rey_2013.jpg" alt="Lana Del Rey">
<span class="nome-artista">Lana Del Rey</span>
</div>
</div>

</section>

</main>

</html>
