
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="teste3.css">
</head>
<body>
    <h1>Título da Tabela</h1>
    <!-- única tabela com duas colunas -->
    <div class="scroll-wrapper">
      <div class="column-container">
        <div class="column" id="left-col">
          <div class="item">1A</div>
          <div class="item">2A</div>
          <div class="item">3A</div>
          <div class="item">4A</div>
          <div class="item">5A</div>
          <div class="item">6A</div>
          <div class="item">7A</div>
          <div class="item">8A</div>
          <div class="item">9A</div>
          <div class="item">10A</div>
          <div class="item">11A</div>
          <div class="item">12A</div>
          <div class="item">13A</div>
          <div class="item">14A</div>
          <div class="item">15A</div>
          <div class="item">16A</div>
          <div class="item">17A</div>
          <div class="item">18A</div>
          <div class="item">19A</div>
          <div class="item">20A</div>
        </div>
      </div>
      <div class="column-container">
        <div class="column" id="right-col">
          <div class="item">1B</div>
          <div class="item">2B</div>
          <div class="item">3B</div>
          <div class="item">4B</div>
          <div class="item">5B</div>
          <div class="item">6B</div>
          <div class="item">7B</div>
          <div class="item">8B</div>
          <div class="item">9B</div>
          <div class="item">10B</div>
          <div class="item">11B</div>
          <div class="item">12B</div>
          <div class="item">13B</div>
          <div class="item">14B</div>
          <div class="item">15B</div>
          <div class="item">16B</div>
          <div class="item">17B</div>
          <div class="item">18B</div>
          <div class="item">19B</div>
          <div class="item">20B</div>
        </div>
      </div>
    </div>


<script>
  // comportamento das colunas
  document.querySelectorAll('.column').forEach(col => {
    const item = col.querySelector('.item'); // primeira linha
    const wrapper = document.querySelector('.scroll-wrapper');

    wrapper.addEventListener('scroll', () => {
      const itemTop = item.offsetTop - wrapper.offsetTop;
      item.classList.toggle('hidden', wrapper.scrollTop >= itemTop);
    });
  });

  // destacar item correspondente na outra coluna
  document.querySelectorAll('.column .item').forEach((item, index) => {
    item.addEventListener('mouseenter', () => {
      // destacar este e o correspondente
      item.classList.add('hover-correspondente');
      const otherColumn = item.closest('.column-container').nextElementSibling || item.closest('.column-container').previousElementSibling;
      if (otherColumn) {
        const otherItem = otherColumn.querySelectorAll('.item')[index];
        if (otherItem) otherItem.classList.add('hover-correspondente');
      }
    });
    item.addEventListener('mouseleave', () => {
      // remover destaque de todos
      document.querySelectorAll('.item.hover-correspondente').forEach(i => i.classList.remove('hover-correspondente'));
    });
  });
</script>

</body>
</html>
