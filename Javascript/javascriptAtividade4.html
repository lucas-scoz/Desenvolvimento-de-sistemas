<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Marcador de Truco</title>
</head>
<body>

    <h2>Nós: <span id="nos">0</span></h2>
    <button id="nos1">+1</button>
    <button id="nos3">+3</button>

    <h2>Eles: <span id="eles">0</span></h2>
    <button id="eles1">+1</button>
    <button id="eles3">+3</button>

    <br><br>
    <button id="reiniciar">Reiniciar Partida</button>

<script>

let pontosNos = 0;
let pontosEles = 0;

function verificar() {
    if (pontosNos >= 12) {
        alert("Nós vencemos!");
    } 
    else if (pontosEles >= 12) {
        alert("Eles venceram!");
    }
}

function atualizarTela() {
    document.getElementById("nos").textContent = pontosNos;
    document.getElementById("eles").textContent = pontosEles;
}

document.getElementById("nos1").onclick = function() {
    pontosNos++;
    atualizarTela();
    verificar();
};

document.getElementById("nos3").onclick = function() {
    pontosNos += 3;
    atualizarTela();
    verificar();
};

document.getElementById("eles1").onclick = function() {
    pontosEles++;
    atualizarTela();
    verificar();
};

document.getElementById("eles3").onclick = function() {
    pontosEles += 3;
    atualizarTela();
    verificar();
};

function reiniciar() {
    pontosNos = 0;
    pontosEles = 0;
    atualizarTela();
}

document.getElementById("reiniciar").onclick = reiniciar;

</script>

</body>
</html>
