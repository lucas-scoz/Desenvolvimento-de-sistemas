<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  
</head>
<body>
    <h1 id="hello">Hello, world!</h1>
    <button onclick="hello()">Hello</button>
</body>
  <script>
    
        let hellos = document.querySelector("#hello");
        function hello(){

            if(hellos.innerHTML === "Hello, world!"){
                hellos.innerHTML = "Adeus!";
            }else {
                hellos.innerHTML = "Hello, world!";
            }
        };
    </script>

</html>
