<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .estilo{
            color: red;
            font-weight:bold; 
        }
    </style>
    <p id="texto">texto para observar as alteracoes</p>
    <button onclick="alternar()">alternar estilo</button>
    <script>
        function alternar(){
      document.getElementById("texto").classList.toggle("estilo");
        }
    </script>
</body>
</html>
